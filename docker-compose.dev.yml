# Local development — build from source, expose host ports.
# Host ports avoid clashes with airbar-core (5435/6382) and legacy stacks.

services:
  postgres-finance:
    container_name: airbar-finance-postgres-dev
    ports:
      - '${POSTGRES_PORT:-5434}:5432'

  redis:
    container_name: airbar-finance-redis-dev
    ports:
      - '${REDIS_PORT:-6381}:6379'

  airbar-finance:
    build: .
    container_name: airbar-finance-app-dev
    env_file: .env
    ports:
      - '${APP_PORT:-8080}:8080'
      - '${GRPC_PORT:-50051}:50051'
    restart: unless-stopped
