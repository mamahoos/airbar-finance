# Nginx snippet for CTO — staging.api.airbar.app
# Pattern: staging.{service}.airbar.app
# Add to airbar-infra/nginx/conf.d/ (e.g. 35-staging-api-ssl.conf)
# Requires DNS: staging.api.airbar.app → server IP
# Requires certbot / ACME entry in 05-acme-http.conf server_name list

upstream airbar_core_staging {
    server airbar-core-app-staging:4000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name staging.api.airbar.app;

    # ssl_certificate /etc/letsencrypt/live/staging.api.airbar.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/staging.api.airbar.app/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location / {
        proxy_pass http://airbar_core_staging;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
