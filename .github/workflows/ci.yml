name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: go mod verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify module
        run: go mod verify

      # Enable after F0 bootstrap (main.go, tests):
      # - run: go vet ./...
      # - run: go test ./...
      # - run: go build -o /dev/null ./cmd/server
