name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: go verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify module
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -buildvcs=false -o /dev/null ./cmd/server
