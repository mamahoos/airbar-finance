name: "[reusable] Docker Build & Push"

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name, e.g. ghcr.io/org/repo"
        type: string
        required: true
      tags:
        description: "Newline-separated list of tags to apply"
        type: string
        required: true
      push:
        description: "Whether to push the image to the registry"
        type: boolean
        default: true
    outputs:
      image-digest:
        description: "SHA256 digest of the pushed image"
        value: ${{ jobs.build-push.outputs.digest }}
      image-metadata:
        description: "Docker image metadata JSON"
        value: ${{ jobs.build-push.outputs.metadata }}

jobs:
  build-push:
    name: build & push
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.build.outputs.metadata }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          cache-from: type=registry,ref=${{ inputs.image }}:buildcache
          cache-to: type=registry,ref=${{ inputs.image }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ inputs.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
