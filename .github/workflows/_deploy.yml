name: "[reusable] Deploy"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging | production)"
        type: string
        required: true
      image-tag:
        description: "Full image tag to deploy, e.g. ghcr.io/org/repo:sha-abc1234"
        type: string
        required: true
      deploy-path:
        description: "Absolute path on the server, e.g. /srv/airbar.app/airbar-finance"
        type: string
        required: true
      compose-file:
        description: "Compose file relative to deploy-path"
        type: string
        default: "docker-compose.staging.yml"
      container-name:
        description: "Container name for health checks"
        type: string
        required: true
      health-url:
        description: "HTTP readiness URL inside the container"
        type: string
        default: "http://localhost:8080/health/ready"
      run-goose-migrations:
        description: "Run goose migrations before compose up (finance only)"
        type: boolean
        default: false
      health-retries:
        description: "Number of health check attempts before failing"
        type: number
        default: 10
      health-interval:
        description: "Seconds between health check attempts"
        type: number
        default: 6
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      SSH_PORT:
        required: false
    outputs:
      deploy-duration:
        description: "Deployment duration in seconds"
        value: ${{ jobs.deploy.outputs.duration }}

jobs:
  deploy:
    name: deploy to ${{ inputs.environment }}
    runs-on: self-hosted
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    outputs:
      duration: ${{ steps.timer.outputs.duration }}

    steps:
      - uses: actions/checkout@v7

      - name: Record start time
        id: start
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull image on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "docker pull ${{ inputs.image-tag }}"

      - name: Sync deploy files to server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ inputs.deploy-path }}/migrations'"

          scp -i ~/.ssh/deploy_key \
            -P "${{ secrets.SSH_PORT || '22' }}" \
            "${{ inputs.compose-file }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ inputs.deploy-path }}/"

          if [ "${{ inputs.run-goose-migrations }}" = "true" ]; then
            scp -i ~/.ssh/deploy_key \
              -P "${{ secrets.SSH_PORT || '22' }}" \
              -r internal/infrastructure/postgres/migrations/. \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ inputs.deploy-path }}/migrations/"
          fi

      - name: Run goose migrations
        if: inputs.run-goose-migrations
        run: |
          ENV_FILE=".env.staging"
          if [ "${{ inputs.environment }}" = "production" ]; then
            ENV_FILE=".env.production"
          fi
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -eu
             cd '${{ inputs.deploy-path }}'
             set -a
             # shellcheck disable=SC1091
             . ./${ENV_FILE}
             set +a
             docker run --rm --network airbar-net \
               -v '${{ inputs.deploy-path }}/migrations:/migrations' \
               -e GOOSE_DRIVER=postgres \
               -e GOOSE_DBSTRING=\"\${DATABASE_URL}\" \
               kukymbr/goose-docker:3.24.1"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ inputs.deploy-path }}' && \
             IMAGE_TAG=${{ inputs.image-tag }} \
             ENV_FILE=.env.staging && \
             [ '${{ inputs.environment }}' = 'production' ] && ENV_FILE=.env.production || true && \
             docker compose --env-file \"\${ENV_FILE}\" -f '${{ inputs.compose-file }}' up -d --remove-orphans"

      - name: Wait for service to be ready
        run: |
          echo "Running health check (up to ${{ inputs.health-retries }} attempts)..."
          for i in $(seq 1 ${{ inputs.health-retries }}); do
            echo "Attempt $i/${{ inputs.health-retries }}..."
            if ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.SSH_PORT || '22' }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "docker exec ${{ inputs.container-name }} wget -q -O /dev/null '${{ inputs.health-url }}'"; then
              echo "✅ Service is ready."
              exit 0
            fi
            sleep ${{ inputs.health-interval }}
          done
          echo "❌ Service did not become ready in time."
          exit 1

      - name: Calculate deploy duration
        id: timer
        if: always()
        run: |
          duration=$(( $(date +%s) - ${{ steps.start.outputs.ts }} ))
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "Deploy took ${duration}s"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
