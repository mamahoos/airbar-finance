name: "[reusable] Notify Deploy"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging | production)"
        type: string
        required: true
      image-tag:
        description: "Image tag that was deployed"
        type: string
        required: true
      status:
        description: "Deployment status (success | failure | rollback)"
        type: string
        required: true
      duration:
        description: "Deployment duration in seconds"
        type: string
        default: "unknown"
      actor:
        description: "Who triggered the deployment"
        type: string
        required: true
      run-url:
        description: "URL to the workflow run"
        type: string
        required: true
    secrets:
      TELEGRAM_TO:
        required: true
      TELEGRAM_TOKEN:
        required: true

jobs:
  notify:
    name: telegram notify
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Notify success
        if: inputs.status == 'success'
        uses: appleboy/telegram-action@master
        with:
          format: markdown
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          disable_notification: true
          message: |
            ✅ **Deploy succeeded** — `${{ inputs.environment }}`
            Image: `${{ inputs.image-tag }}`
            By: `${{ inputs.actor }}`
            Duration: `${{ inputs.duration }}s`
            ${{ inputs.run-url }}

      - name: Notify failure
        if: inputs.status == 'failure'
        uses: appleboy/telegram-action@master
        with:
          format: markdown
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ **Deploy FAILED** — `${{ inputs.environment }}`
            Image: `${{ inputs.image-tag }}`
            By: `${{ inputs.actor }}`
            Duration: `${{ inputs.duration }}s`
            ${{ inputs.run-url }}

      - name: Notify rollback
        if: inputs.status == 'rollback'
        uses: appleboy/telegram-action@master
        with:
          format: markdown
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ⏪ **Rollback executed** — `${{ inputs.environment }}`
            Rolled back to: `${{ inputs.image-tag }}`
            By: `${{ inputs.actor }}`
            ${{ inputs.run-url }}
