# Manual SSH deploy to staging VPS only.
# Image is built automatically by staging.yml after CI on main.
# Default tag "staging" = latest CI-built image on GHCR.

name: Deploy — Staging

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to deploy (default staging = latest CI-built image)"
        required: false
        default: staging
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # never abort an in-progress SSH deploy

jobs:
  deploy:
    name: deploy to staging
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      image-tag: ghcr.io/${{ github.repository }}:${{ inputs.image-tag }}
      deploy-path: /srv/airbar.app/airbar-finance
      compose-file: docker-compose.staging.yml
      container-name: airbar-finance-app-staging
      health-url: http://localhost:8080/health/ready
      run-goose-migrations: true
    secrets:
      SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
