# Manual only — do NOT auto-deploy to the company VPS.
# Staging server deploy is gated until infra/bootstrap is explicitly approved.
# CI (ci.yml) still runs automatically on every PR and push to main.
#
# When ready (months later): run manually from Actions → Deploy — Staging.

name: Deploy — Staging

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: build & push image
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      image: ghcr.io/${{ github.repository }}
      tags: |
        ghcr.io/${{ github.repository }}:staging
        ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      push: true
    permissions:
      actions: read
      checks: read
      contents: read
      packages: write
      security-events: write

  deploy:
    name: deploy to staging
    needs: build-push
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      image-tag: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      deploy-path: /srv/airbar.app/airbar-finance
      compose-file: docker-compose.staging.yml
      container-name: airbar-finance-app-staging
      health-url: http://localhost:8080/health/ready
      run-goose-migrations: true
    secrets:
      SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
