name: Deploy — Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  guard:
    name: check CI result
    runs-on: self-hosted
    timeout-minutes: 2
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding to staging deploy"

  build-push:
    name: build & push image
    needs: guard
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      image: ghcr.io/${{ github.repository }}
      tags: |
        ghcr.io/${{ github.repository }}:staging
        ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}
      push: true
    permissions:
      contents: read
      packages: write
      security-events: write

  deploy:
    name: deploy to staging
    needs: build-push
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      image-tag: ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}
    secrets:
      SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
