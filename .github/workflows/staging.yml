# Auto-build staging image after CI passes on main.
# Pushes to GHCR only — does NOT SSH to the company VPS.
# Server deploy: run "Deploy — Staging" manually when ready.
#
# Concurrency: one staging build at a time; newer commits cancel in-progress builds.
# Guard: skip build if a newer commit already landed on main (stale CI completion).

name: Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

concurrency:
  group: staging-${{ github.repository }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  guard:
    name: check CI result & latest commit
    runs-on: self-hosted
    timeout-minutes: 2
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Skip superseded commits
        id: check
        run: |
          latest="$(git rev-parse HEAD)"
          triggered="${{ github.event.workflow_run.head_sha }}"
          if [ "$latest" = "$triggered" ]; then
            echo "Building staging image for $triggered (main HEAD)"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skip: $triggered is not main HEAD ($latest) — a newer commit won"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: build & push image
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      ref: ${{ github.event.workflow_run.head_sha }}
      image: ghcr.io/${{ github.repository }}
      tags: |
        ghcr.io/${{ github.repository }}:staging
        ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}
      push: true
    permissions:
      actions: read
      checks: read
      contents: read
      packages: write
      security-events: write
