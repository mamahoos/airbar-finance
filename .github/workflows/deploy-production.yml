name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to deploy (e.g. v1.2.3 or sha-abc1234)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to production
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      image-tag: ghcr.io/${{ github.repository }}:${{ inputs.image-tag }}
      deploy-path: /srv/airbar.app/airbar-finance
      compose-file: docker-compose.prod.yml
      container-name: airbar-finance-app-prod
      health-url: http://localhost:8080/health/ready
      run-goose-migrations: true
    secrets:
      SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
