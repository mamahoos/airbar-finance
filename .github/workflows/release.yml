name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: build & push image
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      image: ghcr.io/${{ github.repository }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        ghcr.io/${{ github.repository }}:latest
        ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      push: true
    permissions:
      contents: read
      packages: write
      security-events: write

  github-release:
    name: create github release
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            echo "First release — no previous tag found."
            NOTES="Initial release."
          else
            NOTES=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges)
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "**Docker image:** \`ghcr.io/${{ github.repository }}:${{ github.ref_name }}\`"
            echo "**Digest:** \`${{ needs.build-push.outputs.image-digest }}\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
