# Base stack — shared service definitions for all environments.
# Use with an overlay:
#   dev:     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   staging: IMAGE_TAG=ghcr.io/... docker compose -f docker-compose.staging.yml up -d
#            (server: /srv/airbar.app/airbar-finance/, shared airbar-net + airbar-postgres)
#   prod:    IMAGE_TAG=ghcr.io/... docker compose -f docker-compose.prod.yml up -d

name: ${COMPOSE_PROJECT_NAME:-airbar-finance}

services:
  postgres-finance:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airbar}
      POSTGRES_DB: ${POSTGRES_DB:-airbar_finance}
    volumes:
      - postgres_finance_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-airbar} -d ${POSTGRES_DB:-airbar_finance}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  airbar-finance:
    depends_on:
      postgres-finance:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-airbar}:${POSTGRES_PASSWORD}@postgres-finance:5432/${POSTGRES_DB:-airbar_finance}?sslmode=disable
      REDIS_URL: redis://redis:6379/${REDIS_DB:-1}
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_finance_data:
  redis_data:
