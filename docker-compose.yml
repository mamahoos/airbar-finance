services:
  postgres-finance:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airbar
      POSTGRES_PASSWORD: airbar
      POSTGRES_DB: airbar_finance
    ports:
      - "5434:5432"
    volumes:
      - postgres_finance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airbar -d airbar_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  airbar-finance:
    build: .
    ports:
      - "8080:8080"
      - "50051:50051"
    env_file: .env
    depends_on:
      postgres-finance:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_finance_data:
