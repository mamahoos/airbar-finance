services:
  postgres-finance:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airbar}
      POSTGRES_DB: ${POSTGRES_DB:-airbar_finance}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_finance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airbar} -d ${POSTGRES_DB:-airbar_finance}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  airbar-finance:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${GRPC_PORT:-50051}:50051"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-airbar}:${POSTGRES_PASSWORD:-airbar}@postgres-finance:5432/${POSTGRES_DB:-airbar_finance}?sslmode=disable
      REDIS_URL: redis://redis:${REDIS_INTERNAL_PORT:-6379}/${REDIS_DB:-1}
    depends_on:
      postgres-finance:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_finance_data: