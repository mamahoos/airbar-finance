# Staging on company VPS — shared airbar-infra on airbar-net.
# Server path: /srv/airbar.app/airbar-finance/
# Requires: .env.staging on server (copy from .env.staging.example)
# Prereq: airbar-infra running (airbar-postgres, airbar-redis on airbar-net)
# DB bootstrap (once): CREATE DATABASE airbar_finance_staging;

services:
  airbar-finance:
    image: ${IMAGE_TAG:?IMAGE_TAG is required for staging deploy}
    container_name: airbar-finance-app-staging
    env_file: .env.staging
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://airbar-redis:6379/1}
    networks:
      airbar-net:
        aliases:
          - airbar-finance-app-staging
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.35
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '-O',
          '-',
          'http://localhost:8080/health/ready',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  airbar-net:
    external: true
    name: airbar-net
